seminars:
  - title: Anisotropic mesh adaptation. Theory and applications.
    html: https://jvanhare.github.io/slides/
    pdf: toto.pdf
    img:
      - item: fig/2021-01-22_CEA/c608_symmetry.png
      - item: fig/2021-01-22_CEA/mach_ite19.png
      - item: fig/2021-01-22_CEA/mesh_ite19.png
      - item: fig/2021-01-22_CEA/mach_ite39.png
      - item: fig/2021-01-22_CEA/mesh_ite39.png
      - item: fig/2021-01-22_CEA/mach_ite59.png
      - item: fig/2021-01-22_CEA/mesh_ite59.png
      - item: fig/2021-01-22_CEA/mach_ite79.png
      - item: fig/2021-01-22_CEA/mesh_ite79.png
      - item: fig/2021-01-22_CEA/mach_ite99.png
      - item: fig/2021-01-22_CEA/mesh_ite99.png
    institution: CEA-Cesta
    institution_url: https://www.cea.fr/english
    location: Le Barp, France
    date: 2021-01-22
    link: "Jan_2021_CEA"
    abstract: "Computational Fluid Dynamics (CFD) entered the aerospace industry some decades ago.
      During the last 20 years, the focus was mainly on increasing solver robustness and accuracy.
      However, obvious as it may be, no mesh implies no solution
      and the latter depends on the mesh quality.
      Indeed, mesh and solution should be seen as a couple.
      The numerical schemes and the mesh generation methods have to be tightly linked.
      A very efficient approach to address these challenges is the anisotropic unstructured mesh adaptation
      and the vertex-centered Mixed Finite Element Finite Volume (MFEFV) method.
      First of all, an emphasis is put on the theory of anisotropic unstructured meshes and error estimates
      for steady and unsteady flow simulations.
      The cavity operator, including its non-manifold version,
      is then presented to obtain, strictly speaking, the anisotropic mesh.
      To conclude with the theoretical aspects, the key principles of the MFEFV method are presented.
      Finally, this whole framework is illustrated by two major applications:
      a fluid-structure interaction problem dealing with an elastic panel in shock tube
      and the C608 low boom flight demonstrator test case from the third AIAA Sonic Boom Prediction Workshop (SBPW)."

